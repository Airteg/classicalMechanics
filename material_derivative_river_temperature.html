<h2 class="sr-only">Елемент рідини дрейфує крізь температурне поле; повна зміна температури, яку він відчуває, складається з локальної (поле гріється з часом) і конвективної (елемент рухається в тепліші ділянки) частин.</h2>
<svg width="100%" viewBox="0 0 680 170" role="img" style="display:block;max-height:170px">
<title>Матеріальна похідна</title><desc>Температурне поле з просторовим градієнтом і часовою зміною; елемент рухається крізь нього.</desc>
<g id="strips"></g>
<rect x="80" y="50" width="560" height="80" fill="none" stroke="var(--color-border-secondary)" stroke-width="1" rx="4"/>
<circle id="parcel" cx="360" cy="90" r="9" fill="#ffffff" stroke="#2C2C2A" stroke-width="2.5"/>
<text x="80" y="146" style="font-size:12px" fill="var(--color-text-secondary)">холодніше</text>
<text x="640" y="146" text-anchor="end" style="font-size:12px" fill="var(--color-text-secondary)">тепліше →</text>
</svg>
<div style="display:flex;align-items:center;gap:12px;margin:14px 0 14px">
  <span style="font-size:13px;color:var(--color-text-secondary);min-width:120px">швидкість елемента v</span>
  <input type="range" id="vel" min="0" max="0.4" value="0.2" step="0.02" style="flex:1">
  <span style="font-size:13px;font-weight:500;min-width:36px;text-align:right" id="vel-out">0.20</span>
</div>
<div style="display:flex;gap:10px">
  <div style="flex:1;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.8rem .9rem">
    <p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 4px">локальна ∂T/∂t</p>
    <p style="font-size:18px;font-weight:500;margin:0" id="o-loc">0.0</p>
  </div>
  <div style="flex:1;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.8rem .9rem">
    <p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 4px">конвективна v·∇T</p>
    <p style="font-size:18px;font-weight:500;margin:0" id="o-conv">0.0</p>
  </div>
  <div style="flex:1;background:var(--color-background-info);border-radius:var(--border-radius-md);padding:.8rem .9rem">
    <p style="font-size:12px;color:var(--color-text-info);margin:0 0 4px">повна DT/Dt</p>
    <p style="font-size:18px;font-weight:500;margin:0;color:var(--color-text-info)" id="o-tot">0.0</p>
  </div>
</div>
<script>
(function(){
  var n=28,x0=80,W=560,sw=W/n,grad=0.62,Aamp=0.12,om=1.2;
  var stripsG=document.getElementById('strips');
  var parcel=document.getElementById('parcel');
  var vel=document.getElementById('vel'),velOut=document.getElementById('vel-out');
  var oLoc=document.getElementById('o-loc'),oConv=document.getElementById('o-conv'),oTot=document.getElementById('o-tot');
  var rects=[];for(var i=0;i<n;i++){var r=document.createElementNS('http://www.w3.org/2000/svg','rect');r.setAttribute('x',(x0+i*sw).toFixed(1));r.setAttribute('y',50);r.setAttribute('width',(sw+0.5).toFixed(1));r.setAttribute('height',80);stripsG.appendChild(r);rects.push(r);}
  function col(T){T=Math.max(0,Math.min(1,T));var a=[60,120,205],b=[238,238,236],c=[214,70,40],r,g,bl,f;if(T<0.5){f=T/0.5;r=a[0]+(b[0]-a[0])*f;g=a[1]+(b[1]-a[1])*f;bl=a[2]+(b[2]-a[2])*f;}else{f=(T-0.5)/0.5;r=b[0]+(c[0]-b[0])*f;g=b[1]+(c[1]-b[1])*f;bl=b[2]+(c[2]-b[2])*f;}return 'rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(bl)+')';}
  var p=0.5;
  function render(t){
    var base=0.2+Aamp*Math.sin(t*om);
    for(var i=0;i<n;i++){rects[i].setAttribute('fill',col(base+grad*(i/(n-1))));}
    parcel.setAttribute('cx',(x0+p*W).toFixed(1));
    var v=parseFloat(vel.value);
    var loc=Aamp*om*Math.cos(t*om), conv=v*grad, tot=loc+conv;
    velOut.textContent=v.toFixed(2);
    oLoc.textContent=(loc*10).toFixed(1);oConv.textContent=(conv*10).toFixed(1);oTot.textContent=(tot*10).toFixed(1);
  }
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  vel.addEventListener('input',function(){if(reduce)render(0);});
  if(reduce){render(0);}
  else{var t0=null,last=null;function frame(ts){if(t0===null){t0=ts;last=ts;}var t=(ts-t0)/1000;var dt=(ts-last)/1000;last=ts;p=(p+parseFloat(vel.value)*dt)%1;render(t);requestAnimationFrame(frame);}requestAnimationFrame(frame);}
})();
</script>
