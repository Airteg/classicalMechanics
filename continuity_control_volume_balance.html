<h2 class="sr-only">Маса в контрольному об'ємі змінюється лише через різницю припливу й відпливу: коли приплив перевищує відплив, рівень росте, коли менший — падає, рівні — стале.</h2>
<svg width="100%" viewBox="0 0 680 250" role="img" style="display:block;max-height:250px">
<title>Контрольний об'єм: баланс маси</title><desc>Бак із припливом зверху і відпливом знизу; рівень міняється від різниці потоків.</desc>
<defs><marker id="ftip" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<line id="inarr" x1="340" y1="12" x2="340" y2="46" stroke="#D85A30" stroke-width="6" marker-end="url(#ftip)"/>
<text x="356" y="30" style="font-size:13px;font-weight:500" fill="#993C1D">приплив ρv</text>
<rect id="fill" x="261" y="46" width="158" height="0" fill="#1D9E75" fill-opacity="0.55"/>
<rect x="260" y="45" width="160" height="170" rx="6" fill="none" stroke="var(--color-border-secondary)" stroke-width="1.5"/>
<line id="outarr" x1="340" y1="216" x2="340" y2="248" stroke="#D85A30" stroke-width="6" marker-end="url(#ftip)"/>
<text x="356" y="236" style="font-size:13px;font-weight:500" fill="#993C1D">відплив ρv</text>
</svg>
<div style="display:flex;flex-direction:column;gap:8px;margin:14px 0 14px">
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:13px;color:var(--color-text-secondary);min-width:78px">приплив</span>
    <input type="range" id="qin" min="0" max="1" value="0.6" step="0.05" style="flex:1">
    <span style="font-size:13px;font-weight:500;min-width:32px;text-align:right" id="qin-o">0.60</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:13px;color:var(--color-text-secondary);min-width:78px">відплив</span>
    <input type="range" id="qout" min="0" max="1" value="0.6" step="0.05" style="flex:1">
    <span style="font-size:13px;font-weight:500;min-width:32px;text-align:right" id="qout-o">0.60</span>
  </div>
</div>
<div style="background:var(--color-background-info);border-radius:var(--border-radius-md);padding:.8rem 1rem">
  <p style="font-size:13px;color:var(--color-text-info);margin:0 0 4px">∂(маса)/∂t = приплив − відплив</p>
  <p style="font-size:20px;font-weight:500;margin:0;color:var(--color-text-info)" id="dmdt">0.00 · стала</p>
</div>
<script>
(function(){
  var fill=document.getElementById('fill'),inarr=document.getElementById('inarr'),outarr=document.getElementById('outarr');
  var qin=document.getElementById('qin'),qout=document.getElementById('qout');
  var qinO=document.getElementById('qin-o'),qoutO=document.getElementById('qout-o'),dmdt=document.getElementById('dmdt');
  var top=46,maxH=168,L=0.5;
  function readout(){
    var a=parseFloat(qin.value),b=parseFloat(qout.value);
    qinO.textContent=a.toFixed(2);qoutO.textContent=b.toFixed(2);
    inarr.setAttribute('stroke-width',(2+a*8).toFixed(1));
    outarr.setAttribute('stroke-width',(2+b*8).toFixed(1));
    var d=a-b;
    dmdt.textContent=(d>0?'+':'')+d.toFixed(2)+' \u00b7 '+(Math.abs(d)<0.001?'\u0441\u0442\u0430\u043b\u0430':d>0?'\u0440\u043e\u0441\u0442\u0435':'\u043f\u0430\u0434\u0430\u0454');
  }
  function draw(){fill.setAttribute('y',(top+maxH*(1-L)).toFixed(1));fill.setAttribute('height',(maxH*L).toFixed(1));}
  qin.addEventListener('input',readout);qout.addEventListener('input',readout);
  readout();draw();
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(!reduce){var last=null;function frame(t){if(last===null)last=t;var dt=(t-last)/1000;last=t;var d=parseFloat(qin.value)-parseFloat(qout.value);L=Math.max(0.05,Math.min(0.95,L+d*dt*0.35));draw();requestAnimationFrame(frame);}requestAnimationFrame(frame);}
})();
</script>
