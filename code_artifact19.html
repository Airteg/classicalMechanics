<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Візуалізація: Матриця пружних сталих</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #334155;
        }
        .matrix-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
            background-color: #cbd5e1;
            padding: 8px;
            border-radius: 8px;
            width: fit-content;
            margin: 0 auto;
        }
        .cell {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            background-color: white;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .cell.zero { color: #cbd5e1; background-color: #f8fafc; font-weight: normal; }
        .cell.c11 { background-color: #bfdbfe; color: #1e3a8a; border: 2px solid #3b82f6; }
        .cell.c12 { background-color: #bbf7d0; color: #14532d; border: 2px solid #22c55e; }
        .cell.c44 { background-color: #fef08a; color: #713f12; border: 2px solid #eab308; }
        .cell.c_other { background-color: #f5f3ff; color: #4c1d95; border: 1px solid #8b5cf6; }
        .cell.dependent { background-color: #fed7aa; color: #9a3412; border: 2px dashed #f97316; font-size: 0.75rem;}
    </style>
</head>
<body class="p-8">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-slate-100">
        <h2 class="text-2xl font-bold text-center mb-2 text-slate-800">Структура матриці пружності (6x6)</h2>
        <p class="text-center text-slate-500 mb-8">Матриця Фойгта: зв'язок 6 компонент напруг із 6 компонентами деформацій</p>

        <div class="flex justify-center gap-4 mb-8">
            <button onclick="setMaterial('triclinic')" id="btn-triclinic" class="px-4 py-2 rounded-lg border-2 border-slate-300 font-semibold hover:bg-slate-50 transition-colors">Загальне (21)</button>
            <button onclick="setMaterial('cubic')" id="btn-cubic" class="px-4 py-2 rounded-lg border-2 border-slate-300 font-semibold hover:bg-slate-50 transition-colors">Кубічний кристал (3)</button>
            <button onclick="setMaterial('isotropic')" id="btn-isotropic" class="px-4 py-2 rounded-lg border-2 border-slate-300 font-semibold hover:bg-slate-50 transition-colors">Ізотропне тіло (2)</button>
        </div>

        <div class="flex flex-col md:flex-row items-center justify-center gap-12">
            <div id="matrix" class="matrix-container shadow-inner">
                <!-- Клітинки генеруються через JS -->
            </div>

            <div class="max-w-xs space-y-4">
                <h3 class="font-bold text-lg border-b pb-2" id="desc-title">Опис</h3>
                <p class="text-sm text-slate-600" id="desc-text">Оберіть матеріал для перегляду матриці.</p>
                
                <div id="legend" class="hidden flex-col gap-2 mt-4 text-sm">
                    <div class="flex items-center gap-2"><div class="w-4 h-4 bg-blue-200 border-2 border-blue-500 rounded"></div> <span>C₁₁ (Поздовжній стиск)</span></div>
                    <div class="flex items-center gap-2"><div class="w-4 h-4 bg-green-200 border-2 border-green-500 rounded"></div> <span>C₁₂ (Поперечне розширення)</span></div>
                    <div class="flex items-center gap-2"><div class="w-4 h-4 bg-yellow-200 border-2 border-yellow-500 rounded"></div> <span>C₄₄ (Чистий зсув)</span></div>
                    <div id="leg-dep" class="flex items-center gap-2 hidden"><div class="w-4 h-4 bg-orange-200 border-2 border-orange-500 border-dashed rounded"></div> <span>Залежна константа</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const matrixEl = document.getElementById('matrix');
        
        // Ініціалізація пустої 6x6 матриці (симетричної)
        const cells = [];
        for (let i = 0; i < 6; i++) {
            cells[i] = [];
            for (let j = 0; j < 6; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                matrixEl.appendChild(cell);
                cells[i][j] = cell;
            }
        }

        function renderMatrix(config) {
            for (let i = 0; i < 6; i++) {
                for (let j = 0; j < 6; j++) {
                    const cell = cells[i][j];
                    cell.className = 'cell'; // скидання класів
                    
                    // Симетрія матриці C_ij = C_ji
                    let r = i <= j ? i : j;
                    let c = i <= j ? j : i;
                    
                    let val = config[r][c];
                    
                    if (val === 0) {
                        cell.textContent = '0';
                        cell.classList.add('zero');
                    } else if (val === 'C11') {
                        cell.textContent = 'C₁₁';
                        cell.classList.add('c11');
                    } else if (val === 'C12') {
                        cell.textContent = 'C₁₂';
                        cell.classList.add('c12');
                    } else if (val === 'C44') {
                        cell.textContent = 'C₄₄';
                        cell.classList.add('c44');
                    } else if (val === 'DEP') {
                        cell.innerHTML = '½(C₁₁<br>-C₁₂)';
                        cell.classList.add('dependent');
                    } else {
                        cell.textContent = `C${r+1}${c+1}`;
                        cell.classList.add('c_other');
                    }
                }
            }
        }

        function setMaterial(type) {
            // Оновлення кнопок
            document.querySelectorAll('button').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
                b.classList.add('border-slate-300', 'text-slate-700');
            });
            document.getElementById(`btn-${type}`).classList.add('bg-blue-600', 'text-white', 'border-blue-600');
            document.getElementById(`btn-${type}`).classList.remove('border-slate-300', 'text-slate-700');

            const descTitle = document.getElementById('desc-title');
            const descText = document.getElementById('desc-text');
            const legend = document.getElementById('legend');
            const legDep = document.getElementById('leg-dep');

            legend.classList.remove('hidden');

            if (type === 'triclinic') {
                descTitle.textContent = 'Триклінна сингонія (21)';
                descText.textContent = 'Найнижча симетрія. Всі 21 незалежні компоненти симетричної матриці 6x6 можуть бути ненульовими.';
                legend.classList.add('hidden');
                
                let cfg = Array(6).fill().map(() => Array(6).fill('other'));
                renderMatrix(cfg);
            } 
            else if (type === 'cubic') {
                descTitle.textContent = 'Кубічний кристал (3)';
                descText.textContent = 'Висока симетрія. Залишається лише 3 незалежні константи. Зсувні компоненти не пов\'язані з нормальними напругами (нулі навколо).';
                legDep.classList.add('hidden');
                
                let cfg = [
                    ['C11', 'C12', 'C12', 0, 0, 0],
                    ['C12', 'C11', 'C12', 0, 0, 0],
                    ['C12', 'C12', 'C11', 0, 0, 0],
                    [0, 0, 0, 'C44', 0, 0],
                    [0, 0, 0, 0, 'C44', 0],
                    [0, 0, 0, 0, 0, 'C44']
                ];
                renderMatrix(cfg);
            }
            else if (type === 'isotropic') {
                descTitle.textContent = 'Ізотропне тіло (2)';
                descText.textContent = 'Повна симетрія. Константи C₁₁, C₁₂ залишаються, але зсувна константа C₄₄ стає залежною від них: C₄₄ = (C₁₁ - C₁₂)/2. Незалежних лише 2 (напр. сталі Ламе).';
                legDep.classList.remove('hidden');

                let cfg = [
                    ['C11', 'C12', 'C12', 0, 0, 0],
                    ['C12', 'C11', 'C12', 0, 0, 0],
                    ['C12', 'C12', 'C11', 0, 0, 0],
                    [0, 0, 0, 'DEP', 0, 0],
                    [0, 0, 0, 0, 'DEP', 0],
                    [0, 0, 0, 0, 0, 'DEP']
                ];
                renderMatrix(cfg);
            }
        }

        // Запуск
        setMaterial('cubic');
    </script>
</body>
</html>
