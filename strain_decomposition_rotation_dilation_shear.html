<h2 class="sr-only">Локальний рух елемента рідини розкладається на обертання (антисиметрична частина), розширення (слід тензора швидкості деформації) і зсув (симетрична позадіагональна частина); повзунки керують кожною компонентою.</h2>
<svg width="100%" viewBox="0 0 680 250" role="img" style="display:block;max-height:250px">
<title>Розклад деформації елемента</title><desc>Кругла крапелька деформується під дією обертання, розширення і зсуву.</desc>
<circle cx="340" cy="125" r="72" fill="none" stroke="var(--color-border-tertiary)" stroke-width="1" stroke-dasharray="4 4"/>
<polygon id="ring" points="" fill="#1D9E75" fill-opacity="0.16" stroke="#1D9E75" stroke-width="2"/>
<line id="crossH" x1="268" y1="125" x2="412" y2="125" stroke="#D85A30" stroke-width="2"/>
<line id="crossV" x1="340" y1="53" x2="340" y2="197" stroke="#D85A30" stroke-width="2"/>
<circle cx="340" cy="125" r="3" fill="var(--color-text-secondary)"/>
</svg>
<div style="display:flex;flex-direction:column;gap:9px;margin:14px 0 6px">
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:13px;color:var(--color-text-secondary);min-width:150px">обертання <span style="opacity:.7">(вихор, антисим.)</span></span>
    <input type="range" id="rot" min="-1.2" max="1.2" value="0" step="0.05" style="flex:1">
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:13px;color:var(--color-text-secondary);min-width:150px">розширення <span style="opacity:.7">(слід ∇·v)</span></span>
    <input type="range" id="dil" min="-0.5" max="0.5" value="0" step="0.02" style="flex:1">
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:13px;color:var(--color-text-secondary);min-width:150px">зсув <span style="opacity:.7">(симетрична позадіаг.)</span></span>
    <input type="range" id="shr" min="0" max="0.6" value="0.4" step="0.02" style="flex:1">
  </div>
</div>
<script>
(function(){
  var cx=340,cy=125,R=72,N=48;
  var ring=document.getElementById('ring'),cH=document.getElementById('crossH'),cV=document.getElementById('crossV');
  var rot=document.getElementById('rot'),dil=document.getElementById('dil'),shr=document.getElementById('shr');
  var base=[];for(var i=0;i<N;i++){var a=2*Math.PI*i/N;base.push([R*Math.cos(a),R*Math.sin(a)]);}
  function T(x,y,th,sc,g){
    var sx=x+g*y, sy=y+g*x;        // зсув (симетричний)
    sx*=sc; sy*=sc;                // розширення
    var ax=sx*Math.cos(th)-sy*Math.sin(th), ay=sx*Math.sin(th)+sy*Math.cos(th); // обертання
    return [cx+ax, cy-ay];
  }
  function render(a){
    var th=parseFloat(rot.value)*a, sc=1+parseFloat(dil.value)*a, g=parseFloat(shr.value)*a;
    ring.setAttribute('points', base.map(function(p){var q=T(p[0],p[1],th,sc,g);return q[0].toFixed(1)+','+q[1].toFixed(1);}).join(' '));
    var hA=T(-R,0,th,sc,g),hB=T(R,0,th,sc,g),vA=T(0,-R,th,sc,g),vB=T(0,R,th,sc,g);
    cH.setAttribute('x1',hA[0].toFixed(1));cH.setAttribute('y1',hA[1].toFixed(1));cH.setAttribute('x2',hB[0].toFixed(1));cH.setAttribute('y2',hB[1].toFixed(1));
    cV.setAttribute('x1',vA[0].toFixed(1));cV.setAttribute('y1',vA[1].toFixed(1));cV.setAttribute('x2',vB[0].toFixed(1));cV.setAttribute('y2',vB[1].toFixed(1));
  }
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  [rot,dil,shr].forEach(function(s){s.addEventListener('input',function(){if(reduce)render(1);});});
  if(reduce){render(1);}
  else{var t0=null;function frame(t){if(t0===null)t0=t;var a=(1-Math.cos((t-t0)/1000*1.2))/2;render(a);requestAnimationFrame(frame);}requestAnimationFrame(frame);}
})();
</script>
